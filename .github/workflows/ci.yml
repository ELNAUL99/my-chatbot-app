name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  TAVILY_API_KEY: "test-tavily-key-for-ci"
  GROQ_API_KEY: "test-groq-key-for-ci"
  NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
  ALLOWED_ORIGINS: "https://test.example.com"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
