name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      TAVILY_API_KEY: "test-tavily-key-for-ci"
      GROQ_API_KEY: "test-groq-key-for-ci"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
      ALLOWED_ORIGINS: "https://test.example.com"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
